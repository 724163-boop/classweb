<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassWeb AI Admin</title>

<style>
body{
    background:#000;
    color:#00ff41;
    font-family:Consolas,Monaco,monospace;
    min-height:100vh;
    margin:0;
    padding:20px;
}

.terminal-window{
    width:100%;
    max-width:1200px;
    margin:auto;
    background:#000;
    border:1px solid #00ff41;
    border-radius:8px;
    overflow:hidden;
    box-shadow:
        0 0 10px rgba(0,255,65,.2),
        0 0 40px rgba(0,255,65,.1);
}

.terminal-header{
    background:#111;
    padding:8px 12px;
    border-bottom:1px solid #00ff41;
}

.terminal-title{
    color:#00ff41;
}

#output{
    height:500px;
    overflow-y:auto;
    padding:15px;
    white-space:pre-wrap;
    line-height:1.5;
}

.input-line{
    display:flex;
    padding:10px;
    border-top:1px solid #00ff41;
}

.prompt{
    color:#00ff41;
    margin-right:8px;
}

#command{
    flex:1;
    background:transparent;
    border:none;
    color:#00ff41;
    font-family:inherit;
    font-size:15px;
}

#command:focus{
    outline:none;
}
</style>
</head>

<body>

<div id="terminal">

ClassWeb Administration Console
Version 1.0

Unauthorized access prohibited.

Type 'help' to view commands.

------------------------------------------------

Available Commands

help
status
mode partial
mode full
password <password>
update <instruction>
clear

------------------------------------------------

classweb@admin:~$

</div>

<script>

async function sendUpdate(){

    const password =
        document.getElementById("password").value;

    const mode =
        document.getElementById("mode").value;

    const prompt =
        document.getElementById("prompt").value;

    if(!password){
        alert("パスワードを入力してください");
        return;
    }

    if(!prompt.trim()){
        alert("AIへの指示を入力してください");
        return;
    }

    if(mode === "full"){

        const ok = confirm(
`警告

サイト全体を書き換えます。

AIの誤動作により
HTML・CSS・JavaScriptが破損する可能性があります。

続行しますか？`
        );

        if(!ok){
            return;
        }
    }

    const btn =
        document.getElementById("sendBtn");

    const status =
        document.getElementById("status");

    btn.disabled = true;

    status.textContent =
        "更新要求送信中...";

    try{

        const response = await fetch(
            "https://classweb-ai-server.onrender.com/update",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    password,
                    mode,
                    prompt
                })
            }
        );

        const result =
            await response.json();

        if(response.ok){

            status.textContent =
                "✅ 更新要求を送信しました\n\n" +
                JSON.stringify(result,null,2);

        }else{

            status.textContent =
                "❌ エラー\n\n" +
                JSON.stringify(result,null,2);
        }

    }catch(error){

        status.textContent =
            "❌ 通信エラー\n\n" +
            error.message;
    }

    btn.disabled = false;
}

</script>

</body>
</html>
