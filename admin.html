<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassWeb AI Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#e6edf3;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:16px;
    padding:24px;
    box-shadow:0 0 20px rgba(0,0,0,.35);
}

h1{
    margin-bottom:8px;
    font-size:28px;
}

.subtitle{
    color:#8b949e;
    margin-bottom:24px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    background:#0d1117;
    color:#e6edf3;
    border:1px solid #30363d;
    border-radius:10px;
    padding:12px;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#58a6ff;
}

textarea{
    resize:vertical;
    min-height:250px;
}

.warning{
    margin-top:10px;
    color:#ff7b72;
}

button{
    margin-top:20px;
    background:#238636;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 18px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#2ea043;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#status{
    margin-top:20px;
    background:#0d1117;
    border:1px solid #30363d;
    border-radius:10px;
    padding:12px;
    min-height:48px;
    white-space:pre-wrap;
}

.info{
    margin-top:12px;
    padding:10px;
    border-radius:8px;
    background:#111827;
    color:#8b949e;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>🤖 ClassWeb AI</h1>
<p class="subtitle">サイト管理画面</p>

<label for="password">
管理者パスワード
</label>

<input
    id="password"
    type="password"
    placeholder="パスワード">

<label for="mode">
編集モード
</label>

<select id="mode">
    <option value="partial">
        お知らせ更新（安全）
    </option>

    <option value="full">
        サイト全体更新（危険）
    </option>
</select>

<div class="warning">
⚠ 全体更新はHTML・CSS・JavaScriptを含むサイト全体を書き換える可能性があります
</div>

<label for="prompt">
AIへの指示
</label>

<textarea
    id="prompt"
    placeholder="例: 今日の記事を修学旅行のお知らせに変更してください"></textarea>

<button id="sendBtn" onclick="sendUpdate()">
更新実行
</button>

<div class="info">
Bモード推奨。Aモードはサイト破損の可能性があります。
</div>

<div id="status">
待機中
</div>

</div>

</div>

<script>

async function sendUpdate(){

    const password =
        document.getElementById("password").value;

    const mode =
        document.getElementById("mode").value;

    const prompt =
        document.getElementById("prompt").value;

    if(!password){
        alert("パスワードを入力してください");
        return;
    }

    if(!prompt.trim()){
        alert("AIへの指示を入力してください");
        return;
    }

    if(mode === "full"){

        const ok = confirm(
`警告

サイト全体を書き換えます。

AIの誤動作により
HTML・CSS・JavaScriptが破損する可能性があります。

続行しますか？`
        );

        if(!ok){
            return;
        }
    }

    const btn =
        document.getElementById("sendBtn");

    const status =
        document.getElementById("status");

    btn.disabled = true;

    status.textContent =
        "更新要求送信中...";

    try{

        const response = await fetch(
            "https://classweb-ai-server.onrender.com/update",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    password,
                    mode,
                    prompt
                })
            }
        );

        const result =
            await response.json();

        if(response.ok){

            status.textContent =
                "✅ 更新要求を送信しました\n\n" +
                JSON.stringify(result,null,2);

        }else{

            status.textContent =
                "❌ エラー\n\n" +
                JSON.stringify(result,null,2);
        }

    }catch(error){

        status.textContent =
            "❌ 通信エラー\n\n" +
            error.message;
    }

    btn.disabled = false;
}

</script>

</body>
</html>
