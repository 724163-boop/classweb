<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3-4 website</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#fff;
    font-family:'MS PGothic','Arial',sans-serif;
    margin:20px;
}

.bar { background:#b4d3e6; padding:12px; margin-bottom:20px; }

.bar2 { background:#b4d3e6; padding:5px; margin-bottom:20px; }

.tab-button {
    background:transparent;
    border:none;
    padding:5px 15px;
    cursor:pointer;
}

.tab-button.active {
    background:#fff;
    font-weight:bold;
}

.tab-content { display:none; padding:20px; }
.tab-content.active { display:block; }

.txt { background:#f5f5f5; padding:10px; margin:10px 0; }

/* ボタンリンク */
.link-btn {
    display:inline-block;
    background:#b4d3e6;
    color:#003366;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
    margin-left:10px;
}

.link-btn:hover {
    background:#003366;
    color:#fff;
}
</style>
</head>

<body>

<div class="bar">
    <h1>クラスのサイト</h1>
</div>

<div class="bar2">
    <button class="tab-button active" onclick="switchTab(0)">メイン</button>
    <button class="tab-button" onclick="switchTab(1)">お知らせ/記事</button>
    <button class="tab-button" onclick="switchTab(2)">時間割</button>
    <button class="tab-button" onclick="switchTab(3)">連絡先</button>
</div>

<!-- メイン -->
<div class="tab-content active">
    <p class="txt">国語:課題〜</p>

    <p class="txt">
        その他:
        <a href="https://docs.google.com/forms/u/0/d/1lfKVejtwy52skpuiQcuH2qut4EieY7BsHb2srUFW2r0/edit?authuser=0"
           target="_blank"
           class="link-btn">
           ２年間の振り返り
        </a>
    </p>
</div>

<!-- お知らせ -->
<div class="tab-content">
    <p>4月18日 学力調査</p>
</div>

<!-- 時間割 -->
<div class="tab-content">
    <p>ここに時間割</p>
</div>

<!-- 連絡先 -->
<div class="tab-content">
    <p>担任：衣笠先生</p>
</div>

<script>
function switchTab(index){
    const buttons = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');

    buttons.forEach((b,i)=>b.classList.toggle('active',i===index));
    contents.forEach((c,i)=>c.classList.toggle('active',i===index));
}
</script>

</body>
</html>
